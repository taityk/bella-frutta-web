          - generic [ref=e118]:
            - paragraph [ref=e119]: 築地生まれ、築地育ち。創業150年の高級鮮魚仲卸業を営む父のもとで、旬の食材に宿るこだわりと愛情を、肌と舌で学んできました。
            - paragraph [ref=e120]: 「同じ魚でも、産地、時期、収穫方法、水揚げ後の加工処理、提供のタイミングで、最高にも普通にもなる」——この確信は、果物にも変わらず当てはまります。作り手のこだわりと愛情が産物に反映され、それが最終的に食べる人の感動に繋がる。
            - paragraph [ref=e121]: 60歳を超えての新たな挑戦。最高のフルーツをもっと身近なものに。そのフルーツへの想いを、そのまま伝えたい——その一心でBella Fruttaを始めました。
